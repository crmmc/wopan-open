name: Release

on:
  workflow_dispatch:
    inputs:
      base-version:
        description: Base version prefix for release tags.
        required: true
        type: string
        default: v0.1.0

permissions:
  contents: write

jobs:
  ui-tests:
    uses: ./.github/workflows/_tests.yml
    with:
      pytest-targets: tests/test_main_window.py tests/test_login_window.py tests/test_app_controller.py
      xvfb: true

  logic-tests:
    uses: ./.github/workflows/_tests.yml
    with:
      pytest-targets: tests --ignore=tests/test_main_window.py --ignore=tests/test_login_window.py --ignore=tests/test_app_controller.py
      xvfb: false

  version:
    needs:
      - ui-tests
      - logic-tests
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release tag
        id: version
        run: |
          date_part="$(date -u +%Y%m%d)"
          short_sha="$(git rev-parse --short HEAD)"
          tag="${{ inputs['base-version'] }}-${date_part}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${tag}"

  build:
    needs:
      - ui-tests
      - logic-tests
      - version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact-name: wopan-linux-x86_64
            asset-name: openwopan-linux-x86_64
            artifact-path: build/openwopan
          - os: windows-latest
            artifact-name: wopan-windows-x64
            asset-name: openwopan-windows-x64.exe
            artifact-path: build/openwopan.exe
          - os: macos-latest
            artifact-name: wopan-macos-arm64
            asset-name: openwopan-macos-arm64.zip
            artifact-path: build/openwopan.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ccache \
            libdbus-1-3 \
            libegl1 \
            libfuse2 \
            libgl1 \
            libopengl0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0 \
            patchelf

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Build executable
        shell: bash
        run: |
          args=(
            --assume-yes-for-downloads
            --jobs=1
            --follow-imports
            --enable-plugin=pyside6
            --include-package=qfluentwidgets
            --output-dir=build
            --output-filename=openwopan
            --product-name=OpenWoPan
            --product-version=0.1.0
            --company-name=OpenWoPan
          )

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            args+=(--mode=onefile --onefile-tempdir-spec="{CACHE_DIR}/OpenWoPan/{PRODUCT}/{VERSION}" --windows-console-mode=disable)
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            args+=(--mode=app --macos-app-name=OpenWoPan --macos-app-version=0.1.0)
          else
            args+=(--mode=onefile --onefile-tempdir-spec="{CACHE_DIR}/OpenWoPan/{PRODUCT}/{VERSION}")
          fi

          uv run python -m nuitka "${args[@]}" src/openwopan/app/main.py

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            mv build/main.app build/openwopan.app
          fi

      - name: Package artifact
        shell: bash
        env:
          ARTIFACT_PATH: ${{ matrix.artifact-path }}
          ASSET_NAME: ${{ matrix.asset-name }}
        run: |
          if [[ ! -f "$ARTIFACT_PATH" && ! -d "$ARTIFACT_PATH" ]]; then
            echo "Missing artifact: $ARTIFACT_PATH" >&2
            exit 1
          fi

          if [[ -f "$ARTIFACT_PATH" ]]; then
            size="$(python -c 'import os, sys; print(os.path.getsize(sys.argv[1]))' "$ARTIFACT_PATH")"
          else
            size="$(python -c 'import os, sys; print(sum(os.path.getsize(os.path.join(root, name)) for root, _, files in os.walk(sys.argv[1]) for name in files))' "$ARTIFACT_PATH")"
          fi
          if [[ "$size" -le 0 ]]; then
            echo "Artifact is empty: $ARTIFACT_PATH" >&2
            exit 1
          fi

          mkdir -p release-assets
          if [[ -d "$ARTIFACT_PATH" ]]; then
            ditto -c -k --keepParent "$ARTIFACT_PATH" "release-assets/$ASSET_NAME"
          else
            cp "$ARTIFACT_PATH" "release-assets/$ASSET_NAME"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release-assets/${{ matrix.asset-name }}
          if-no-files-found: error

  release:
    needs:
      - build
      - version
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wopan-*
          path: release-assets
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body_path: CHANGELOG.md
          draft: true
          files: release-assets/*
