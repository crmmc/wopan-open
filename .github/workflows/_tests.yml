name: Reusable Tests

on:
  workflow_call:
    inputs:
      pytest-targets:
        required: true
        type: string
      xvfb:
        required: false
        type: boolean
        default: false

jobs:
  pytest:
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
      QTWEBENGINE_CHROMIUM_FLAGS: --disable-gpu --no-sandbox
      QTWEBENGINE_DISABLE_SANDBOX: "1"
      PYTEST_TARGETS: ${{ inputs['pytest-targets'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libopengl0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxkbcommon-x11-0

      - name: Run pytest under Xvfb
        if: ${{ inputs.xvfb }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" uv run pytest $PYTEST_TARGETS

      - name: Run pytest
        if: ${{ !inputs.xvfb }}
        run: uv run pytest $PYTEST_TARGETS
